name: product_scanner
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.5.1
  mobile_scanner: ^4.0.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  file_picker: ^8.0.0
  excel: ^4.0.0
  intl: ^0.19.0
  share_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4
  image: ^4.3.0
  msix: ^3.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48
msix:
  logo_path: "assets/icon.png"